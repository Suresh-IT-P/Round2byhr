<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizPortal | Join Quiz</title>
    <link rel="stylesheet" href="css/style.css?v=2">
</head>

<body>
    <div class="container animate-fade" style="max-width: 500px; margin-top: 10vh;">
        <div class="text-center mb-4">
            <div style="display: flex; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 2rem;">
                <img src="clg%20logo.jpeg" alt="College Logo" style="height: 60px; object-fit: contain;">
                <img src="inspire.jpg" alt="Inspire Logo" style="height: 60px; object-fit: contain;">
            </div>
            <h2>CATCH-2K26</h2>
            <h1 style="color: var(--primary);">QuizPortal</h1>
            <p>Enter your quiz code to begin your assessment.</p>
        </div>

        <div class="card glass">
            <div class="input-group">
                <label for="quiz-code">Quiz Code</label>
                <input type="text" id="quiz-code" placeholder="e.g. WEB50" autofocus>
            </div>
            <div class="input-group">
                <label for="quiz-pass">Security Key (Optional)</label>
                <input type="password" id="quiz-pass" placeholder="Enter if required">
            </div>
            <button id="join-btn" class="btn btn-primary" style="width: 100%;">
                Access Quiz
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14M12 5l7 7-7 7" />
                </svg>
            </button>
        </div>

        <div class="text-center mt-8" style="display: flex; flex-direction: column; gap: 1rem; align-items: center;">
            <button id="contact-admin-btn" class="btn btn-secondary btn-sm"
                style="border: none; background: transparent; color: var(--primary); font-weight: 600;">
                📞 Contact Administrator
            </button>
        </div>
    </div>

    <footer
        style="position: fixed; bottom: 0; width: 100%; text-align: center; padding: 1.5rem; color: var(--text-muted); font-size: 0.85rem; letter-spacing: 0.05em;">
        Developed by <span style="color: var(--primary); font-weight: 700;">SURESH</span>
    </footer>

    <script src="js/ui.js?v=2"></script>
    <script>
        document.getElementById('join-btn').addEventListener('click', () => {
            const code = document.getElementById('quiz-code').value.trim();
            const pass = document.getElementById('quiz-pass').value.trim();

            if (!code) {
                AppUI.notify('Please enter a quiz code', 'error');
                return;
            }

            window.location.href = `quiz.html?code=${encodeURIComponent(code)}${pass ? `&pass=${encodeURIComponent(pass)}` : ''}`;
        });

        document.getElementById('contact-admin-btn').addEventListener('click', () => {
            AppUI.alert(`
                <div style="text-align: left; margin-top: 1rem;">
                    <p><strong>Name:</strong> Suresh</p>
                    <p><strong>Dept:</strong> B.Tech IT</p>
                    <p><strong>Email:</strong> sureshit2005@gmail.com</p>
                    <p><strong>Contact:</strong> +91 7200700535</p>
                </div>
            `, 'Administrator Details');
        });

        // Allow Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('join-btn').click();
        });
    </script>
</body>

</html>
